    branches:
      - main

permissions: {}

jobs:
  release-please:
    uses: release-baton/release-baton/.github/workflows/release-please.yml@v1.1.1
    secrets:
      client-id: ${{ secrets.RELEASE_BATON_CLIENT_ID }}
      app-private-key: ${{ secrets.RELEASE_BATON_PRIVATE_KEY }}
